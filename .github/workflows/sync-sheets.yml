name: Sync Firestore → Google Sheets

on:
  schedule:
    # Roda a cada 15 minutos
    - cron: '*/15 * * * *'
  # Permite rodar manualmente pelo GitHub
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Executar sincronização
        run: node scripts/sync-google-sheets.mjs
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          SHEETS_CALENDARIO_ID: 1gsSMkeQceBYTRa9IKshvuNqa-WGImLNUcPKt2h3iSJg
